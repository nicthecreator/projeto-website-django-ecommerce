{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHD Store - Verificar E-mail</title>
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
    <link rel="stylesheet" href="{% static 'css/verificar_codigo.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container-central">
        <div class="login-box" style="background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
            <img src="{% static 'images/logo-nav.png' %}" alt="Logo PHD Store" class="login-logo-mobile">
            <h1 class="login-title-desktop">PHD Store<br/><span class="login-subtitle">Confirme seu E-mail</span></h1>
            <p style="color: #666; margin-bottom: 25px; line-height: 1.5;">
                Enviamos um código de 6 dígitos para seu e-mail.<br>
                Digite-o abaixo para ativar sua conta.
            </p>

            <form id="verificarForm" method="POST" action="{% url 'verificar_codigo' %}">
                {% csrf_token %}
                <div class="input-group">
                    <div class="input-field" style="justify-content: center; border: 2px solid #eee;">
                        <input type="text" id="codigo" maxlength="6" placeholder="000000" 
                            style="text-align: center; font-size: 32px; letter-spacing: 8px; font-weight: 700; width: 100%;" required>
                    </div>
                </div>

                <button type="submit" class="btn-entrar" style="margin-top: 10px;">Verificar Conta</button>
            </form>

            <button id="btnReenviar" class="resend-link" data-url="{% url 'reenviar_codigo' %}">
                Código não chegou? Clique aqui para enviar novamente
            </button>
        </div>
    </div>

    <script src="{% static 'js/verificar_codigo.js' %}"></script>
</body>
</html>
